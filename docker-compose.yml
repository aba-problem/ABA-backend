version: "3.9"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: abaproblem-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SA_PASSWORD}
      MSSQL_PID: Express
    mem_limit: 2560m
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      abaproblem_net:
        ipv4_address: 172.28.0.10
    restart: unless-stopped

  keys-init:
    image: busybox
    command: sh -c "mkdir -p /keys && chown -R 1654:1654 /keys"
    volumes:
      - dataprotection_keys:/keys

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: abaproblem-backend
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    mem_limit: 400m
    volumes:
      - dataprotection_keys:/keys
    depends_on:
      - sqlserver
      - keys-init
    networks:
      abaproblem_net:
        ipv4_address: 172.28.0.20
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: abaproblem-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    mem_limit: 100m
    depends_on:
      - backend
    networks:
      abaproblem_net:
        ipv4_address: 172.28.0.30
    restart: unless-stopped

networks:
  abaproblem_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  sqlserver_data:
  dataprotection_keys: