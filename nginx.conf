# ============================================================================
# Módulo 5.3 — Reverse proxy delante del backend. Kestrel NUNCA recibe tráfico
# de internet directo: Angular y el navegador solo conocen esta URL pública.
# ============================================================================

worker_processes 1;                 # Módulo 6: presupuesto de RAM acotado (50-100MB objetivo)

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # Oculta la versión de Nginx en el header Server (defensa en profundidad).
    server_tokens off;

    # ------------------------------------------------------------------
    #  Zonas de rate limiting a nivel de conexión/petición (Módulo 5.3):
    #  defensa REDUNDANTE contra Slowloris/flood antes de llegar al proceso .NET.
    #  El backend YA tiene sus propios rate limiters (Módulo 5.1); esto es la
    #  segunda capa, más barata, a nivel de Nginx/kernel.
    # ------------------------------------------------------------------
    limit_req_zone  $binary_remote_addr zone=req_zone:10m  rate=20r/m;
    limit_conn_zone $binary_remote_addr zone=conn_zone:10m;

    # Anti-Slowloris a nivel de socket/kernel (Módulo 5.3).
    client_body_timeout   10s;
    client_header_timeout 10s;
    client_max_body_size  1m;        # coherente con Kestrel MaxRequestBodySize (Módulo 5.2)
    keepalive_timeout     30s;

    upstream backend_abaproblem {
        # Nombre del servicio en docker-compose.yml — nunca IP/host hardcodeado
        # que Angular pueda ver (Módulo 5.5: topología interna oculta).
        server backend:8080;
    }

    server {
        listen 80;
        server_name api.aba.andrescortes.dev;

        limit_req  zone=req_zone burst=10 nodelay;
        limit_conn conn_zone 20;

        location / {
            proxy_pass http://backend_abaproblem;
            proxy_http_version 1.1;

            # X-Forwarded-For / X-Forwarded-Proto — el backend los consume vía
            # ForwardedHeadersMiddleware (Program.cs) para ver la IP real del cliente
            # en sus propios rate limiters, no la IP de este proxy.
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;

            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }
    }

    # ------------------------------------------------------------------
    # Producción: termina TLS aquí y redirige 80 → 443. Monta certificados
    # (p.ej. Let's Encrypt/certbot) como volumen; NUNCA los commitees al repo.
    # ------------------------------------------------------------------
    # server {
    #     listen 443 ssl http2;
    #     server_name api.aba.andrescortes.dev;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #
    #     limit_req  zone=req_zone burst=10 nodelay;
    #     limit_conn conn_zone 20;
    #
    #     location / {
    #         proxy_pass http://backend_abaproblem;
    #         proxy_set_header Host             $host;
    #         proxy_set_header X-Real-IP         $remote_addr;
    #         proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #     }
    # }
}
