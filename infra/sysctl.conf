# ============================================================================
# Módulo 5.4 — Hardening de kernel/OS para la VPS. Fuera del código de la app;
# aplicar en el HOST (no dentro del contenedor) copiando estas líneas a
# /etc/sysctl.d/99-abaproblem.conf y ejecutando: sysctl --system
# ============================================================================

# Protección contra SYN flood
net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_max_syn_backlog = 2048

# Backlog de conexiones aceptadas por el kernel antes de que la app las procese
net.core.somaxconn = 1024

# Libera sockets en TIME_WAIT más rápido tras un flood
net.ipv4.tcp_fin_timeout = 15

